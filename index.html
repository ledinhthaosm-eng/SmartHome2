<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMART HOME</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  </head>
  <body>
  <h2>MINI SMART HOME ESP32 - WEBSOCKET + MQTT</h2>

<div class="dashboard">
  <div class="room">
    <p><b>LIVING ROOM</b></p>
    <div class="device">
      <p>LIGHTING:
        <span id="text_living_light">---</span></p>
      <button class="device-btn"
        data-device="living_light"
        id="btn_living_light">
        TURN ON
      </button>
    </div>
  </div>

  <div class="room">
    <p><b>BED ROOM</b></p>
    <div class="device">
      <p>LIGHTING:
        <span id="text_bed_light">---</span></p>
      <button class="device-btn"
        data-device="bed_light"
        id="btn_bed_light">
        TURN ON
      </button>
    </div>
  </div>

  <div class="room">
    <p><b>KITCHEN</b></p>
    <div class="device">
      <p>LIGHTING:
        <span id="text_kitchen_light">---</span></p>
      <button class="device-btn"
        data-device="kitchen_light"
        id="btn_kitchen_light">
        TURN ON
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
